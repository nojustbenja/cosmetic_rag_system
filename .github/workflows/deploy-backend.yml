name: Deploy Backend to Hugging Face Spaces

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          mkdir hf_space
          cd hf_space
          git init
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote add origin https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME
          
          # Obtener la rama main si existe
          git fetch origin main || echo "Empty repo"
          git checkout -b main
          git reset --hard origin/main || echo "No main to reset to"
          
          # Sincronizar los archivos del backend al entorno raíz del Space
          # Excluimos .git y README.md para no sobrescribir la configuración del Space, 
          # y también excluimos los PDFs para que git push no falle (Hugging Face bloquea binarios pesados sin LFS/Xet)
          rsync -av --exclude='.git' --exclude='README.md' --exclude='data/guias/*.pdf' ../backend/ .
          
          git add -A
          git commit -m "Deploy backend from GitHub Actions" || echo "No changes to commit"
          git push origin main
