[pytest]
# pythonpath="." asegura que los paquetes del proyecto (utils, rag, api) se
# resuelvan desde el repo y no queden eclipsados por módulos homónimos del
# entorno (p. ej. un utils.py en el PATH del shell).
pythonpath = .
# asyncio_mode=auto ejecuta los tests `async def` sin necesidad de marcarlos
# con @pytest.mark.asyncio (requiere pytest-asyncio, ya en requirements.txt).
asyncio_mode = auto
testpaths = tests test_profile.py test_rag.py
